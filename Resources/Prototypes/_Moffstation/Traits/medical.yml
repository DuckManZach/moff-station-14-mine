- type: trait
  id: Synth
  name: trait-synth-name
  description: trait-synth-desc
  category: Medical
  conditions:
  - !type:HasCompCondition
    component: Silicon
    invert: true
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
    tooltip: trait-condition-borg-not
  effects:
  - !type:AddCompsEffect
    components:
    - type: Synth
    - type: EmpVulnerable
  - !type:OverrideCompsEffect
    components:
    - type: TypingIndicator
      proto: robot

