- type: entity
  name: Pawgliaci
  parent: MobCorgi
  id: MobPawgliaci
  description: A retired magicians pet, this nervous rabbit was born for the theater.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Moffstation/Mobs/Pets/pawgliaci.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: pawgliaci
  - type: DamageStateVisuals
    states:
      Alive:
        Base: pawgliaci
      Critical:
        Base: pawgliaci-crit
      Dead:
        Base: pawgliaci-dead
  - type: Grammar
    attributes:
      proper: true
      gender: neuter
  - type: Tag
    tags:
    - CannotSuicide
  - type: InteractionPopup
    successChance: 0.5
    interactSuccessString: petting-success-dog
    interactFailureString: petting-failure-pawgliaci
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/fox_squeak.ogg
  - type: Instrument
    allowPercussion: false
    handheld: false
    bank: 1
    program: 5
  - type: GhostTakeoverAvailable
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    name: ghost-role-information-pawgliaci-name
    description: ghost-role-information-pawgliaci-description
    rules: ghost-role-information-nonantagonist-rules
    raffle:
      settings: short
  - type: Speech
    speechVerb: SmallMob
    speechSounds: Squeak
    allowedEmotes: [ 'Squeak' ]
