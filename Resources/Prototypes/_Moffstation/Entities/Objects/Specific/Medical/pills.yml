# Pill entities for Moffstation traits

- type: entity
  name: pill
  suffix: Soretizone 5u
  parent: Pill
  id: PillSoretizone
  components:
  - type: Pill
    pillType: 5
  - type: Sprite
    state: pill6
  - type: Label
    currentLabel: soretizone 5u
  - type: Solution
    solution:
      reagents:
      - ReagentId: Soretizone
        Quantity: 5

- type: entity
  name: pill canister
  parent: PillCanister
  id: PillCanisterSoretizone
  suffix: Soretizone 5u, 14
  components:
  - type: Label
    currentLabel: soretizone 5u
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: PillSoretizone
        amount: 14

