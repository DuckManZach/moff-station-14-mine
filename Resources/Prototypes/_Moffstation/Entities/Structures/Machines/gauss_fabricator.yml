# Thingy that makes engi money
# When the battery becomes full, it pops out a thingy that's worth money, and the capacity resets
# right now at max (250KW) it takes 40 seconds to fill, and produces one thingy
# Right now thats about 300 per minute per thing, seems reasonable enough!
# TODO: See if this needs to be balanced
- type: entity
  id: GaussFabricator
  parent: BaseMachine
  name: gaussian fabrication unit
  description: A high-voltage fabrication unit that channels raw HV current through precision electromagnetic coils, slowly crystallizing dense magnetic alloy as a byproduct. The hum is normal.
  components:
  - type: Sprite
    sprite: Structures/Power/power.rsi
    state: wiredmachine
    snapCardinals: true
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: HVPower
  - type: BatteryCharger
    voltage: High
  - type: PowerNetworkBattery
    maxChargeRate: 10000
    canDischarge: false
  - type: Battery
    maxCharge: 10000000
    startingCharge: 0
    netSyncEnabled: false
  - type: LightningTarget
    priority: 2
  - type: AmbientSound
    enabled: true
    range: 5
    sound:
      path: /Audio/Ambience/Objects/buzzing.ogg
  - type: GaussFabricator
    outputPrototype: MoffRefinedConductorIngot
    maxDrawRate: 250000
  - type: ActivatableUI
    key: enum.GaussFabricatorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.GaussFabricatorUiKey.Key:
        type: GaussFabricatorBoundUserInterface
  - type: StaticPrice
    price: 2000

- type: entity
  parent: BaseItem
  id: MoffRefinedConductorIngot
  name: gaussian hypermagnet
  description: A dense magnet crystallized by intense electromagnetic fields. Highly sought after for its unusual magnetic properties.
  components:
  - type: Sprite
    sprite: Objects/Materials/ingots.rsi
    state: silver_3
    color: "#9fc8e8"
  - type: Item
    size: Small
    heldPrefix: silver
    sprite: Objects/Materials/ingots.rsi
  - type: StaticPrice
    price: 200
